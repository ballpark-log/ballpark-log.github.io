<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballpark Log</title>
  <meta name="description" content="Ballpark Log の公式サイトです。アプリ情報、プライバシーポリシー、問い合わせ先を掲載しています。" />
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #222222;
      --sub: #666666;
      --accent: #6054c2;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }

    h1, h2 {
      margin: 0 0 12px;
    }

    h1 {
      font-size: 2rem;
      color: var(--accent);
    }

    h2 {
      font-size: 1.2rem;
    }

    p {
      margin: 0 0 12px;
    }

    .sub {
      color: var(--sub);
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      color: var(--sub);
      font-size: 0.9rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Ballpark Log</h1>
      <p>Ballpark Log は、プロ野球の観戦記録を手軽に残せるアプリです。</p>
      <p class="sub">試合ごとの観戦履歴や成績を、自分の応援チームにあわせて管理できます。</p>
    </section>

    <section class="card">
      <h2>アプリについて</h2>
      <ul>
        <li>観戦した試合の記録を保存</li>
        <li>応援チームごとの観戦成績を確認</li>
        <li>過去の観戦履歴を年ごとに振り返り</li>
      </ul>
    </section>

    <section class="card">
      <h2>各種ページ</h2>
      <p>プライバシーポリシー</p>
      <ul>
        <li><a href="./privacy-android.html">Android版</a></li>
        <li><a href="./privacy-ios.html">iOS版</a></li>
      </ul>
      <p><a href="./support.html">お問い合わせ</a></p>
    </section>

    <section class="card">
      <h2>運営者</h2>
      <p>Ballpark Log</p>
      <p class="sub">ballpark.log.npb@gmail.com</p>
    </section>

    <footer>
      © Ballpark Log
    </footer>
  </main>
</body>
</html>
